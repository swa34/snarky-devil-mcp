<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Devil head circle -->
  <circle cx="50" cy="52" r="30" fill="none" stroke="#00ff41" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Left horn -->
  <path d="M28 30 L20 8 L35 25" fill="none" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Right horn -->
  <path d="M72 30 L80 8 L65 25" fill="none" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Left eye -->
  <path d="M38 46 L42 42 L46 46" fill="none" stroke="#ff2d55" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right eye -->
  <path d="M54 46 L58 42 L62 46" fill="none" stroke="#ff2d55" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Smirk -->
  <path d="M37 60 Q42 68 50 66 Q58 64 63 60" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round"/>
  <!-- Pitchfork below -->
  <line x1="50" y1="82" x2="50" y2="98" stroke="#00ff41" stroke-width="2" filter="url(#glow)"/>
  <path d="M42 86 L50 82 L58 86" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <line x1="42" y1="86" x2="42" y2="80" stroke="#00ff41" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="58" y1="86" x2="58" y2="80" stroke="#00ff41" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
</svg>
